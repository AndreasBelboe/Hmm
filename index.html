<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hmmm...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f0e8;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.1rem, 2.8vw, 1.6rem);
      line-height: 1.75;
      color: #1a1a1a;
      padding: 8vh 10vw 40vh 10vw;
      word-break: break-word;
    }

    #text {
      display: inline;
    }

    #cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: #1a1a1a;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.5s steps(1) infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #cursor { animation: none; }
    }

    #btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1a1a1a;
      color: #f5f0e8;
      border: none;
      border-radius: 50px;
      padding: 0.6em 1.2em;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    #btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #btn:hover {
      background: #333;
    }

    /* Scrollindikator langs høyre kant */
    #scrollbar {
      position: fixed;
      top: 0;
      right: 0;
      width: 6px;
      height: 100vh;
      background: rgba(0,0,0,0.07);
      z-index: 10;
    }

    #scrollthumb {
      position: absolute;
      top: 0;
      right: 0;
      width: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      min-height: 24px;
    }

    /* Posisjonsetikett øverst til venstre */
    #poslabel {
      position: fixed;
      top: 1.1rem;
      left: 1.4rem;
      font-family: Georgia, serif;
      font-size: 0.78rem;
      color: #1a1a1a;
      opacity: 0.25;
      letter-spacing: 0.03em;
      user-select: none;
      pointer-events: none;
    }

    #poslabel.active {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <span id="text">Hmmm</span><span id="cursor"></span>
  <button id="btn" onclick="goToBottom()">↓ Til bunnen</button>

  <div id="scrollbar"><div id="scrollthumb"></div></div>
  <div id="poslabel">toppen</div>

  <script>
    const textEl   = document.getElementById('text');
    const btn      = document.getElementById('btn');
    const thumb    = document.getElementById('scrollthumb');
    const poslabel = document.getElementById('poslabel');

    const BATCH = 12;
    let buffer = 'Hmmm';
    let autoScroll = true;

    function goToBottom() {
      autoScroll = true;
      btn.classList.remove('visible');
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function updateScrollUI() {
      const scrollable = document.body.scrollHeight - window.innerHeight;
      const progress = scrollable > 0 ? window.scrollY / scrollable : 1;

      // Tommelstørrelse: minst 24px, ellers proporsjonal med synlig andel
      const ratio = window.innerHeight / document.body.scrollHeight;
      const thumbH = Math.max(24, ratio * window.innerHeight);
      const maxTop = window.innerHeight - thumbH;
      const thumbTop = progress * maxTop;

      thumb.style.height = thumbH + 'px';
      thumb.style.top    = thumbTop + 'px';

      // Etikett
      if (scrollable <= 0 || progress >= 0.999) {
        poslabel.textContent = 'bunnen';
      } else if (progress <= 0.001) {
        poslabel.textContent = 'toppen';
      } else {
        const pct = Math.round(progress * 100);
        poslabel.textContent = pct + '% ned';
      }

      const notAtBottom = window.innerHeight + window.scrollY < document.body.scrollHeight - 10;
      poslabel.classList.toggle('active', notAtBottom && progress > 0.001);
    }

    window.addEventListener('scroll', () => {
      const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 10;
      if (atBottom) {
        autoScroll = true;
        btn.classList.remove('visible');
      } else {
        autoScroll = false;
        btn.classList.add('visible');
      }
      updateScrollUI();
    }, { passive: true });

    function frame() {
      buffer += 'm'.repeat(BATCH);
      textEl.textContent = buffer;
      if (autoScroll) {
        window.scrollTo(0, document.body.scrollHeight);
      }
      updateScrollUI();
      requestAnimationFrame(frame);
    }

    setTimeout(() => requestAnimationFrame(frame), 400);
  </script>
</body>
</html>
