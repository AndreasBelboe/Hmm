<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hmmm...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      overflow: hidden;
    }

    .scene {
      width: 90vw;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 10px;
      padding-left: 4px;
      user-select: none;
    }

    .textbox {
      background: #1a1a1a;
      border: 1.5px solid #2e2e2e;
      border-radius: 6px;
      padding: 22px 26px 22px 26px;
      width: 100%;
      min-height: 160px;
      position: relative;
      box-shadow:
        0 0 0 1px #111,
        inset 0 1px 4px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      transition: border-color 0.2s;
    }

    .textbox::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3a7aff33, transparent);
      border-radius: 6px 6px 0 0;
      pointer-events: none;
    }

    #output {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      line-height: 1.7;
      color: #e0e0e0;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 55vh;
      overflow: hidden;
      position: relative;
    }

    /* The blinking cursor */
    #cursor {
      display: inline-block;
      width: 2px;
      height: 1.15em;
      background: #3a7aff;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.53s steps(1) infinite;
      box-shadow: 0 0 8px #3a7affaa;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Fade at the bottom so overflow looks natural */
    .fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #1a1a1a);
      pointer-events: none;
      border-radius: 0 0 6px 6px;
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 0 2px;
      width: 100%;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3aff88;
      box-shadow: 0 0 6px #3aff88;
      animation: pulse 1.1s ease-in-out infinite;
      margin-right: 7px;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-text {
      font-size: 0.62rem;
      color: #3aff88;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      user-select: none;
    }

    .char-count {
      font-size: 0.62rem;
      color: #444;
      letter-spacing: 0.06em;
      user-select: none;
    }

    @media (prefers-reduced-motion: reduce) {
      #cursor { animation: none; opacity: 1; }
      .status-dot { animation: none; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="label">Tekstfelt — ufiltert</div>
    <div class="textbox">
      <div id="output"><span id="text">Hmmm</span><span id="cursor"></span></div>
      <div class="fade-bottom"></div>
    </div>
    <div class="statusbar">
      <div>
        <span class="status-dot"></span>
        <span class="status-text">Skriver...</span>
      </div>
      <div class="char-count" id="counter">5 tegn</div>
    </div>
  </div>

  <script>
    const textEl = document.getElementById('text');
    const counter = document.getElementById('counter');
    const output = document.getElementById('output');
    const cursor = document.getElementById('cursor');

    let content = 'Hmmm';
    let total = content.length;

    // Keep a rolling window — we only display the last N chars to avoid DOM explosion
    const MAX_DISPLAY = 2000;

    // Vary speed: mostly fast, occasional micro-pause like a real keyboard repeat
    function nextDelay() {
      const r = Math.random();
      if (r < 0.004) return 280 + Math.random() * 400; // rare longer pause
      if (r < 0.03)  return 60 + Math.random() * 80;    // occasional small hiccup
      return 28 + Math.random() * 22;                   // normal very fast repeat
    }

    function addM() {
      content += 'm';
      total++;

      // Trim display string to avoid infinite DOM growth
      const displayContent = content.length > MAX_DISPLAY
        ? content.slice(content.length - MAX_DISPLAY)
        : content;

      textEl.textContent = displayContent;

      // Keep cursor after text
      output.insertBefore(cursor, null); // move cursor to end
      textEl.after(cursor);

      // Update counter
      counter.textContent = total.toLocaleString('nb-NO') + ' tegn';

      // Scroll output so newest text is always just above the fade
      output.scrollTop = output.scrollHeight;

      setTimeout(addM, nextDelay());
    }

    // Small initial delay before the "key gets stuck"
    setTimeout(addM, 600);
  </script>
</body>
</html>
